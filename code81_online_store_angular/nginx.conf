server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular's router handles paths like /orders/5 entirely in the browser.
    # Without this fallback, a hard refresh (or someone pasting the URL
    # directly) on /orders/5 would ask nginx for a file that doesn't exist
    # and get a 404. This tells nginx: if the requested file/folder isn't
    # found, serve index.html instead and let Angular's router take it from
    # there.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
