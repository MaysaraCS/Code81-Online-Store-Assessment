<a routerLink="/admin/products" class="back-link">← Back to products</a>

<div class="card form-card">
  <h1>{{ isEditMode ? 'Edit product' : 'New product' }}</h1>

  @if (errorMessage()) {
    <div class="alert alert--danger">{{ errorMessage() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="field">
      <label for="sku">SKU</label>
      <input id="sku" type="text" formControlName="sku" />
    </div>

    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="3"></textarea>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="price">Price (USD)</label>
        <input id="price" type="number" step="0.01" min="0.01" formControlName="price" />
      </div>
      <div class="field">
        <label for="stockQuantity">Stock quantity</label>
        <input id="stockQuantity" type="number" min="0" formControlName="stockQuantity" />
      </div>
    </div>

    <div class="field">
      <label for="categoryId">Category</label>
      <select id="categoryId" formControlName="categoryId">
        <option [ngValue]="null">Select a category…</option>
        @for (c of categories(); track c.id) {
          <option [ngValue]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>

    <button type="submit" class="btn btn--primary" [disabled]="loading()">
      {{ loading() ? 'Saving…' : 'Save product' }}
    </button>
  </form>
</div>
