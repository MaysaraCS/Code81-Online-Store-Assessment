services:
  postgres:
    image: postgres:16-alpine
    container_name: online-store-postgres
    environment:
      POSTGRES_DB: online_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./online-store-api/online-store-api
    container_name: online-store-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DB_HOST is "postgres" (the service name above), not "localhost" -
      # inside a Docker network, containers reach each other by service name.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: online_store
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in your .env file}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_replace_me}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_replace_me}
      STRIPE_SUCCESS_URL: http://localhost:4200/payment/success
      STRIPE_CANCEL_URL: http://localhost:4200/payment/cancel
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./code81_online_store_angular
    container_name: online-store-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
